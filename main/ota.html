<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOBIKE OTA System</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        :root {
            /* ROBOBIKEブランドカラー #207020 に統一 */
            --rb-green: #207020;
            --rb-dark-green: #185a18;
            --bg-light: #f8faf9;
            --panel-white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #95a5a6;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .card {
            width: 90vw;
            max-width: 550px;
            background: var(--panel-white);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(32, 112, 32, 0.1);
            text-align: center;
            border: 1px solid #eef2f0;
        }

        .header-logo {
            margin-bottom: 20px;
        }

        .header-logo img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 12px;
        }

        h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--rb-green);
            letter-spacing: 0.5px;
        }

        .version-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
            margin-bottom: 25px;
        }

        .pc-notice {
            font-size: 12px;
            color: #856404;
            background: #fff9e6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
            border: 1px solid #ffeeba;
        }

        /* アップロードエリアの修正 */
        .upload-area {
            display: flex;
            /* 中身を縦に並べる */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dcdde1;
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            background: #fafcfb;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            min-height: 140px;
            /* 高さを確保 */
            box-sizing: border-box;
            /* パディングを含めたサイズ計算 */
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--rb-green);
            background: #f0fff4;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        #file-name {
            font-weight: bold;
            color: var(--rb-green);
            margin-top: 15px;
            font-size: 14px;
            word-break: break-all;
        }

        input[type="file"] {
            display: none;
        }

        .btn-update {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            background: var(--rb-green);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--rb-dark-green);
        }

        .btn-update:hover {
            opacity: 0.9;
        }

        .btn-update:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .btn-update:disabled {
            background: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .progress-wrapper {
            margin-top: 30px;
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--rb-green);
            transition: width 0.3s;
        }

        #status {
            font-size: 14px;
            margin-top: 15px;
            color: #7f8c8d;
            line-height: 1.5;
        }

        /* デフォルト（PC）ではスマホ警告を隠す */
        .mobile-warning {
            display: none;
            background: #fff5f5;
            color: #c0392b;
            padding: 20px;
            border: 2px solid #e74c3c;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.6;
        }

        /* 画面幅が狭い（スマホなど）の場合の処理 */
        @media (max-width: 600px) {
            .mobile-warning {
                display: block;
                /* 警告のみ表示 */
            }

            /* スマホでは不要な操作系とPC用案内をすべて隠す */
            .upload-area,
            .btn-update,
            .pc-notice,
            .version-info {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>ROBOBIKE システム更新</h2>
        <div class="version-info">システム管理用</div>

        <div class="mobile-warning">
            ⚠️ このページはパソコンから操作してください。
        </div>

        <span class="pc-notice">⚠️ 更新作業は、電源の安定したPCから行ってください。</span>

        <label class="upload-area" id="drop-zone">
            <span class="upload-icon">📁</span>
            <span style="font-size: 14px;">更新ファイルを選択、またはドラッグ</span>
            <div id="file-name">ファイルが選択されていません</div>
            <input type="file" id="file-input" accept=".bin">
        </label>

        <button class="btn-update" id="upload-btn" disabled>アップデート開始</button>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="status">準備完了</div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileNameDisp = document.getElementById('file-name');
        const uploadBtn = document.getElementById('upload-btn');
        const dropZone = document.getElementById('drop-zone');

        // ファイル選択時の処理
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameDisp.innerText = fileInput.files[0].name;
                uploadBtn.disabled = false;
            }
        });

        // アップロード処理
        function startUpdate() {
            const status = document.getElementById('status');
            const wrapper = document.getElementById('progressWrapper');
            const progressBar = document.getElementById('progressBar');
            const file = fileInput.files[0];
            const brandColor = "#207020";

            if (!file) return;

            uploadBtn.disabled = true;
            wrapper.style.display = 'block';

            const xhr = new XMLHttpRequest();
            xhr.upload.addEventListener("progress", (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + "%";
                    status.innerText = `システム転送中: ${percent}%`;
                }
            });

            xhr.onload = function () {
                if (xhr.status === 200) {
                    status.innerHTML = `
                        <div style="margin-top: 20px; padding: 20px; border: 2px solid ${brandColor}; border-radius: 12px; background-color: #ffffff; text-align: left; line-height: 1.6; color: ${brandColor};">
                            <strong style="font-size: 1.2em; display: block; margin-bottom: 10px;">✅ アップデート完了！</strong>
                            <div style="color: #333; font-size: 13px;">
                                ROBOBIKEが正常に更新され、自動で再起動します。<br><br>
                                1. <strong>このPCとROBOBIKEの接続を切り</strong>、通常のWiFiに戻してください。<br>
                                2. <strong>スマートフォン</strong>をROBOBIKEのWi-Fiへ接続し、操作画面を開き直してください。
                            </div>
                        </div>
                    `;
                    progressBar.style.width = "100%";
                    progressBar.style.backgroundColor = brandColor;
                } else {
                    status.innerText = "エラー: 転送に失敗しました (" + xhr.status + ")";
                    status.style.color = "#e74c3c";
                    uploadBtn.disabled = false;
                }
            };

            xhr.onerror = function () {
                status.innerText = "通信エラーが発生しました。接続を確認してください。";
                status.style.color = "#e74c3c";
                uploadBtn.disabled = false;
            };

            xhr.open("POST", "/update");
            // 生バイナリとして送信 (FormDataを使わない)
            xhr.setRequestHeader("Content-Type", "application/octet-stream");
            xhr.send(file);
        }

        uploadBtn.addEventListener('click', startUpdate);

        // ドラッグ&ドロップの演出
        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
        });
        dropZone.addEventListener('drop', (e) => {
            fileInput.files = e.dataTransfer.files;
            if (fileInput.files.length > 0) {
                fileNameDisp.innerText = fileInput.files[0].name;
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
